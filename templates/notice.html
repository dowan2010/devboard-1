<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/css/main.css">
    <link rel="stylesheet" href="/static/css/notice.css">
    <link rel="stylesheet" href="/static/css/notif.css">
    <title>공지사항</title>
</head>
<body>
    <div class="topbar fade-up" style="--fu-delay:0s">
        <div class="topbar-left">
            <a href="/main" class="site-logo"><i data-lucide="code-2" class="li"></i> DevBoard</a>
            <span class="welcome">{{ user_id }}님</span>
        </div>
        <nav class="topbar-nav">
            <a href="/recruit" class="nav-link">구인 게시판</a>
            <a href="/notice" class="nav-link active">공지사항</a>
            <a href="/members" class="nav-link">멤버 보기</a>
            <a href="/showcase" class="nav-link">쇼케이스</a>
        </nav>
        <div class="topbar-center">
            <div class="search-wrap">
                <span class="search-icon"><i data-lucide="search" class="li"></i></span>
                <input type="text" class="search-input" placeholder="게시판·멤버 검색...">
            </div>
        </div>
        <div class="topbar-right">
            <div class="dm-wrap" id="dmWrap">
                <button class="dm-topbar-btn" id="dmBtn" title="DM"><i data-lucide="message-circle" class="li"></i><span class="dm-unread-badge hidden" id="dmBadge"></span></button>
            </div>
            <div class="notif-wrap" id="notifWrap">
                <button class="bell-btn" id="bellBtn"><i data-lucide="bell" class="li"></i><span class="notif-badge hidden" id="notifBadge"></span></button>
            </div>
            <button class="darkmode-btn" title="다크모드" id="darkToggle"><i data-lucide="moon" class="li"></i></button>
            {% if is_admin %}
            <a href="/admin" class="admin-link-btn"><i data-lucide="shield" class="li"></i> 관리자</a>
            {% endif %}
            {% if user_id == '게스트' %}
            <a href="/login_page" class="login-hint-btn">로그인이 안되어있다면?</a>
            {% else %}
            <a href="/user/{{ raw_user_id }}" class="settings-btn"><i data-lucide="user" class="li"></i> 내 프로필</a>
            <a href="/logout" class="logout-btn">로그아웃</a>
            {% endif %}
        </div>
    </div>

    <div class="notice-container fade-up" style="--fu-delay:0.08s">
        <div class="notice-header">
            <h2><i data-lucide="clipboard-list" class="li"></i> 공지사항</h2>
            <p class="notice-sub">운영자가 올린 공지를 확인하세요</p>
        </div>
        <div id="noticeList">
            <div class="notice-loading">불러오는 중...</div>
        </div>
    </div>

    <!-- 공지 상세 모달 -->
    <div class="notice-modal-overlay hidden" id="noticeDetailOverlay">
        <div class="notice-detail-modal">
            <div class="notice-detail-header">
                <div class="notice-detail-meta" id="detailMeta"></div>
                <button class="notice-detail-close" id="detailClose"><i data-lucide="x" class="li"></i></button>
            </div>
            <h2 class="notice-detail-title" id="detailTitle"></h2>
            <div class="notice-detail-content" id="detailContent"></div>

            <!-- 댓글 섹션 -->
            <div class="notice-comment-section">
                <div class="notice-comment-title"><i data-lucide="message-square" class="li"></i> 댓글 <span id="commentCount">0</span></div>
                <div id="commentList" class="notice-comment-list"></div>
                {% if current_user %}
                <div class="notice-comment-input-wrap">
                    <textarea id="commentInput" class="notice-comment-input" placeholder="댓글을 입력하세요... (100자 이내)" maxlength="100" rows="2"></textarea>
                    <button id="commentSubmitBtn" class="notice-comment-submit">등록</button>
                </div>
                {% else %}
                <div class="notice-comment-login">댓글을 달려면 <a href="/login_page">로그인</a>이 필요합니다.</div>
                {% endif %}
            </div>
        </div>
    </div>

    <script>
        // 다크모드
        const darkToggle = document.getElementById('darkToggle');
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark');
            darkToggle.innerHTML = '<i data-lucide="sun" class="li"></i>';
            lucide.createIcons({ el: darkToggle });
        }
        darkToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            darkToggle.innerHTML = isDark ? '<i data-lucide="sun" class="li"></i>' : '<i data-lucide="moon" class="li"></i>';
            lucide.createIcons({ el: darkToggle });
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });

        function escHtml(str) {
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }
        function timeStr(ts) {
            const d = new Date(ts * 1000);
            return d.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        const INIT_NOTICES = {{ init_notices | safe }};

        // 공지 목록 렌더링
        function renderNotices(notices) {
            const list = document.getElementById('noticeList');
            if (!notices.length) {
                list.innerHTML = `
                    <div class="notice-empty">
                        <span class="notice-empty-icon"><i data-lucide="bell" class="li"></i></span>
                        <p>아직 공지사항이 없습니다</p>
                        <span class="notice-empty-sub">새로운 공지가 올라오면 여기서 확인하세요!</span>
                    </div>`;
                lucide.createIcons({ el: list });
                return;
            }
            list.innerHTML = '';
            notices.forEach((n, i) => {
                const card = document.createElement('div');
                card.className = `notice-card${n.is_pinned ? ' pinned' : ''} fade-up`;
                card.style.setProperty('--fu-delay', Math.min(i, 10) * 0.05 + 's');
                card.innerHTML = `
                    <div class="notice-card-left">
                        ${n.is_pinned ? '<span class="notice-pin"><i data-lucide="pin" class="li"></i> 고정</span>' : ''}
                        <div class="notice-card-title">${escHtml(n.title)}</div>
                        <div class="notice-card-preview">${escHtml(n.content)}</div>
                    </div>
                    <div class="notice-card-right">
                        <span class="notice-card-author">${escHtml(n.author_nickname)}</span>
                        <span class="notice-card-date">${timeStr(n.created_at)}</span>
                    </div>
                `;
                card.addEventListener('click', () => openDetail(n));
                list.appendChild(card);
            });
            lucide.createIcons({ el: list });
        }

        // 공지 목록 로드 (새 공지 작성 후 갱신용)
        async function loadNotices() {
            const list = document.getElementById('noticeList');
            try {
                const res  = await fetch('/api/notices');
                const data = await res.json();
                renderNotices(data.notices || []);
            } catch {
                list.innerHTML = '<div class="notice-loading">로딩 실패. 새로고침해주세요.</div>';
            }
        }

        const CURRENT_USER = {{ current_user | tojson }};
        const IS_ADMIN = {{ is_admin | tojson }};
        let currentNoticeId = null;

        // 공지 상세
        function openDetail(n) {
            currentNoticeId = n.id;
            document.getElementById('detailMeta').innerHTML =
                `${escHtml(n.author_nickname)} · ${timeStr(n.created_at)}${n.updated_at > n.created_at + 1 ? ' · (수정됨)' : ''}`;
            document.getElementById('detailTitle').textContent = n.title;
            document.getElementById('detailContent').textContent = n.content;
            document.getElementById('noticeDetailOverlay').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            loadComments(n.id);
        }
        function closeDetail() {
            document.getElementById('noticeDetailOverlay').classList.add('hidden');
            document.body.style.overflow = '';
            currentNoticeId = null;
        }
        document.getElementById('detailClose').addEventListener('click', closeDetail);
        document.getElementById('noticeDetailOverlay').addEventListener('click', e => {
            if (e.target === document.getElementById('noticeDetailOverlay')) closeDetail();
        });

        // ── 댓글 로드 ──
        async function loadComments(noticeId) {
            const list = document.getElementById('commentList');
            const countEl = document.getElementById('commentCount');
            list.innerHTML = '<div class="notice-comment-loading">불러오는 중...</div>';
            try {
                const res = await fetch(`/api/notices/${noticeId}/comments`);
                const data = await res.json();
                countEl.textContent = data.comments.length;
                if (!data.comments.length) {
                    list.innerHTML = '<div class="notice-comment-empty">아직 댓글이 없습니다.</div>';
                    return;
                }
                list.innerHTML = '';
                data.comments.forEach(c => renderComment(c, list));
            } catch {
                list.innerHTML = '<div class="notice-comment-empty">댓글 로딩 실패</div>';
            }
        }

        function renderComment(c, container) {
            const row = document.createElement('div');
            row.className = 'notice-comment-row';
            row.dataset.id = c.id;
            const canDelete = c.is_mine || IS_ADMIN;
            row.innerHTML = `
                <div class="notice-comment-author">${escHtml(c.author_nickname)}</div>
                <div class="notice-comment-body">${escHtml(c.content)}</div>
                <div class="notice-comment-footer">
                    <span class="notice-comment-date">${timeStr(c.created_at)}</span>
                    ${canDelete ? `<button class="notice-comment-del" data-id="${c.id}">삭제</button>` : ''}
                </div>
            `;
            if (canDelete) {
                row.querySelector('.notice-comment-del').addEventListener('click', () => deleteComment(c.id));
            }
            container.appendChild(row);
        }

        // ── 댓글 등록 ──
        const submitBtn = document.getElementById('commentSubmitBtn');
        const commentInput = document.getElementById('commentInput');
        if (submitBtn) {
            submitBtn.addEventListener('click', submitComment);
            commentInput.addEventListener('keydown', e => {
                if (e.key === 'Enter' && !e.isComposing && !e.shiftKey) {
                    e.preventDefault();
                    submitComment();
                }
            });
        }
        async function submitComment() {
            if (!currentNoticeId) return;
            const content = commentInput.value.trim();
            if (!content) return;
            submitBtn.disabled = true;
            const fd = new FormData();
            fd.append('content', content);
            try {
                const res = await fetch(`/api/notices/${currentNoticeId}/comments`, { method: 'POST', body: fd });
                const data = await res.json();
                if (data.success) {
                    commentInput.value = '';
                    await loadComments(currentNoticeId);
                } else {
                    alert(data.error || '오류가 발생했습니다.');
                }
            } catch {
                alert('댓글 등록 실패');
            }
            submitBtn.disabled = false;
        }

        // ── 댓글 삭제 ──
        async function deleteComment(commentId) {
            if (!confirm('댓글을 삭제하시겠습니까?')) return;
            try {
                const res = await fetch(`/api/notices/${currentNoticeId}/comments/${commentId}`, { method: 'DELETE' });
                const data = await res.json();
                if (data.success) {
                    await loadComments(currentNoticeId);
                } else {
                    alert(data.error || '오류');
                }
            } catch {
                alert('삭제 실패');
            }
        }

        // 서버에서 미리 받은 초기 데이터가 있으면 즉시 렌더링, 없으면 API 호출
        if (INIT_NOTICES && INIT_NOTICES.length > 0) {
            renderNotices(INIT_NOTICES);
        } else {
            loadNotices();
        }

    </script>
    <script src="/static/js/notif.js"></script>
    <div class="dm-overlay" id="dmOverlay"></div>
    <div class="dm-panel" id="dmPanel">
        <div class="dm-panel-header">
            <button class="dm-back-btn hidden" id="dmBackBtn"><i data-lucide="arrow-left" class="li"></i></button>
            <span class="dm-panel-title" id="dmPanelTitle"><i data-lucide="message-circle" class="li"></i> 메시지</span>
            <button class="dm-panel-close" id="dmPanelClose"><i data-lucide="x" class="li"></i></button>
        </div>
        <div class="dm-panel-body" id="dmPanelBody"></div>
        <div class="dm-input-area hidden" id="dmInputArea">
            <input type="text" class="dm-input" id="dmInput" placeholder="메시지를 입력하세요..." maxlength="500">
            <button class="dm-send-btn" id="dmSendBtn"><i data-lucide="send" class="li"></i></button>
        </div>
    </div>
    <script src="/static/js/dm.js"></script>
    <footer class="site-footer">
        <a href="https://github.com/dowan1220-ai/DevBoard" target="_blank" rel="noopener"><i data-lucide="github" class="li"></i> 오픈소스 코드</a>
    </footer>
<script>
setInterval(async () => {
    const res = await fetch('/api/session-check');
    if (res.status === 401 || res.status === 403) location.href = '/login';
}, 30000);
</script>
<script src="/static/js/lucide.min.js"></script>
<script>lucide.createIcons();</script>
</body>
</html>
