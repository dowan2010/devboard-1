<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/css/forgot-password.css">
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/4.0.0/uicons-solid-rounded/css/uicons-solid-rounded.css'>
    <title>비밀번호 찾기</title>
</head>
<body>
    <box>
        <div class="login">
            <a class="back-btn" href="/">&#8592; 로그인 화면으로 돌아가기</a>
            <h2 class="gg">비밀번호 찾기</h2>

            <!-- Step 1: 이메일 입력 -->
            <div class="input-wrapper">
                <input type="text" placeholder="가입한 이메일 입력" id="email" oninput="formatEmail()">
                <span class="fixed-suffix">@gmail.com</span>
            </div>
            <button type="button" class="btn small" id="sendCodeBtn" onclick="sendResetCode()" style="display:none;">인증번호 전송</button>

            <!-- Step 2: 인증번호 입력 -->
            <input type="text" placeholder="인증번호 입력" id="verifyCode" oninput="onVerifyCodeInput()" maxlength="6" class="verify-input" style="display:none;">
            <button type="button" class="btn small" id="verifyCodeBtn" onclick="verifyResetCode()" style="display:none;">확인</button>
            <p class="pw-error" id="verifyStatus"></p>

            <!-- Step 3: 새 비밀번호 입력 (인증 완료 후 표시) -->
            <form action="/reset_password" method="POST" id="resetForm" style="display:none;">
                <div class="password-wrapper">
                    <input type="password" placeholder="새 비밀번호 입력" id="pw1" name="password" oninput="checkPwRule(); checkAll()">
                    <i class="fi fi-sr-eye-crossed toggle-pw" id="togglePw1" onclick="togglePassword('pw1', 'togglePw1')"></i>
                </div>
                <p class="pw-error" id="pwRuleError"></p>

                <div class="password-wrapper" style="margin-top:10px;">
                    <input type="password" placeholder="새 비밀번호 확인" id="pw2" oninput="checkPassword(); checkAll()">
                    <i class="fi fi-sr-eye-crossed toggle-pw" id="togglePw2" onclick="togglePassword('pw2', 'togglePw2')"></i>
                </div>
                <p class="pw-error" id="pwError">⚠️ 비밀번호가 일치하지 않습니다.</p>

                <button type="submit" class="btn" id="resetBtn" style="margin-top:10px;" disabled>비밀번호 변경</button>
            </form>
        </div>
    </box>

    <script src="/static/js/forgot-password.js"></script>
</body>
</html>
